services:
	backend:
		build: ./backend
		ports:
			- "8000:8000"
		env_file:
			- .env.example
		depends_on:
			- chromadb
			- redis
			- neo4j
			- postgres
		volumes:
			- ./data:/app/data

	frontend:
		build: ./frontend
		ports:
			- "3000:3000"
		depends_on:
			- backend

	streamlit:
		build: ./streamlit_demo
		ports:
			- "8501:8501"
		depends_on:
			- backend

	chromadb:
		image: chromadb/chroma:latest
		ports:
			- "8001:8000"
		volumes:
			- chroma_data:/chroma/chroma

	redis:
		image: redis:7-alpine
		ports:
			- "6379:6379"
		command: redis-server --save 60 1 --loglevel warning
		volumes:
			- redis_data:/data

	neo4j:
		image: neo4j:5-community
		ports:
			- "7474:7474"
			- "7687:7687"
		environment:
			NEO4J_AUTH: neo4j/password
			NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
		volumes:
			- neo4j_data:/data

	postgres:
		image: ankane/pgvector:latest
		ports:
			- "5432:5432"
		environment:
			POSTGRES_DB: ragdb
			POSTGRES_USER: rag
			POSTGRES_PASSWORD: password
		volumes:
			- pg_data:/var/lib/postgresql/data

	phoenix:
		image: arizephoenix/phoenix:latest
		ports:
			- "6006:6006"

volumes:
	chroma_data:
	redis_data:
	neo4j_data:
	pg_data:
