services:
	backend:
		command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
		volumes:
			- ./backend:/app/backend

	frontend:
		command: npm run dev -- --host 0.0.0.0 --port 3000
		volumes:
			- ./frontend:/app

	streamlit:
		command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
		volumes:
			- ./streamlit_demo:/app
