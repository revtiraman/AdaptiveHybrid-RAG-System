name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: advanced-hybrid-rag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run backend tests
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python -m pytest tests/unit/test_retrieval.py -q
          python -m pytest tests/integration/test_pipeline.py tests/integration/test_api.py tests/integration/test_phase12_apis.py -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: advanced-hybrid-rag/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: advanced-hybrid-rag/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: advanced-hybrid-rag
          file: advanced-hybrid-rag/backend/Dockerfile
          push: false
          tags: advanced-hybrid-rag-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: advanced-hybrid-rag/frontend
          file: advanced-hybrid-rag/frontend/Dockerfile
          push: false
          tags: advanced-hybrid-rag-frontend:ci
